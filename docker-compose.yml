services:
  app:
    env_file:
      - .env
    build:
      context: .
      target: app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  webserver:
    container_name: ewms-webserver
    build:
      context: .
      target: webserver
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
    networks:
      - internal
      - web
    depends_on:
      - app

  queue:
    env_file:
      - .env
    build:
      context: .
      target: app
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
      # Lets DeployLatestRelease restart the app/scheduler containers after a
      # self-deploy (see docs/DEPLOYMENT.md) — this is the only container that
      # gets it, and it means this container can control any container on the
      # host, not just this stack. Only mount this if you've accepted that trade-off.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  scheduler:
    env_file:
      - .env
    build:
      context: .
      target: app
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    networks:
      - internal
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - internal

networks:
  internal:
  web:
    external: true
    name: proxy

volumes:
  storage:
  pgdata:
  redisdata:
