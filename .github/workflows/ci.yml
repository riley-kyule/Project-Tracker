name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    name: Docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify relative markdown links resolve
        run: |
          set -uo pipefail
          status=0
          while IFS= read -r file; do
            dir=$(dirname "$file")
            # Extract relative link targets: [text](target), skipping http(s) and pure anchors.
            # `|| true` because grep exits 1 on files containing no links.
            while IFS= read -r target; do
              [ -z "$target" ] && continue
              case "$target" in
                http://*|https://*|mailto:*) continue ;;
              esac
              if [ ! -e "$dir/$target" ]; then
                echo "::error file=$file::broken link -> $target"
                status=1
              fi
            done < <(grep -oE '\]\([^)#]+' "$file" | sed 's/](//' || true)
          done < <(find . -name '*.md' -not -path './vendor/*' -not -path './node_modules/*')
          if [ "$status" -ne 0 ]; then
            echo "Broken relative links found."
            exit 1
          fi
          echo "All relative markdown links resolve."

  backend:
    name: Backend (Pint + Pest on PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ewms_test
          POSTGRES_USER: ewms
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ewms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: ewms_test
      DB_USERNAME: ewms
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql, pgsql, redis
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Build frontend assets (required by Inertia page tests)
        run: |
          npm ci
          npm run build
      - name: Code style (Pint)
        run: vendor/bin/pint --test
      - name: Tests (Pest)
        run: php artisan test

  frontend:
    name: Frontend (types, lint, format, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint resources/js
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
